<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>여행계획 대시보드</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.2/Sortable.min.js"></script>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Apple SD Gothic Neo','Malgun Gothic',sans-serif; }
        body { background:linear-gradient(135deg,#e0f7fa 0%,#fff3e0 100%); color:#2c3e50; min-height:100vh; }
        header { background:linear-gradient(135deg,#00897b,#26a69a); color:#fff; padding:24px 20px; text-align:center; box-shadow:0 4px 12px rgba(0,0,0,.15); position:relative; }
        header h1 { font-size:24px; margin-bottom:6px; }
        header p { font-size:13px; opacity:.95; }
        .sync-badge { position:absolute; top:12px; right:16px; font-size:11px; padding:5px 12px; border-radius:14px; background:rgba(255,255,255,.25); font-weight:700; color: #fff; }
        .sync-badge.on { background:#43a047; }
        .sync-badge.off { background:#e53935; }
        .sync-badge.saving { background:#fb8c00; }
        
        .meta-edit-box { background: rgba(255, 255, 255, 0.15); max-width: 700px; margin: 10px auto 0; padding: 12px; border-radius: 8px; font-size: 13px; display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; align-items: center; }
        .meta-edit-box input { padding: 6px 10px; border: none; border-radius: 4px; font-size: 13px; font-weight: 600; color: #333; }
        .meta-edit-box button { padding: 6px 12px; background: #004d40; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .meta-edit-box button:hover { background: #00332c; }

        .tabs { display:flex; justify-content:center; gap:6px; background:#fff; padding:12px; box-shadow:0 2px 8px rgba(0,0,0,.08); position:sticky; top:0; z-index:100; flex-wrap:wrap; }
        .tab-btn { padding:10px 18px; border:none; background:#eceff1; border-radius:24px; cursor:pointer; font-size:14px; font-weight:600; }
        .tab-btn.active { background:linear-gradient(135deg,#00897b,#26a69a); color:#fff; }
        .container { max-width:1200px; margin:0 auto; padding:24px 16px; }
        .tab-content { display:none; }
        .tab-content.active { display:block; }
        h2.section-title { font-size:20px; margin-bottom:16px; color:#00897b; }
        .dash-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(240px,1fr)); gap:16px; margin-bottom:20px; }
        .dash-card { background:#fff; border-radius:16px; padding:20px; box-shadow:0 3px 10px rgba(0,0,0,.08); border-top:4px solid #26a69a; }
        .dash-card h3 { font-size:15px; color:#607d8b; margin-bottom:10px; }
        .dash-card .big { font-size:28px; font-weight:700; color:#00897b; }
        .dash-card .sub { font-size:13px; color:#78909c; margin-top:6px; line-height:1.6; }
        .dash-card.ddays { border-top-color:#ff7043; } .dash-card.ddays .big { color:#ff7043; }
        .dash-card.flight { border-top-color:#42a5f5; } .dash-card.flight .big { color:#1976d2; font-size:18px; }
        .dash-card.rent { border-top-color:#ab47bc; } .dash-card.rent .big { color:#8e24aa; font-size:18px; }
        
        .filters { display:flex; gap:8px; margin-bottom:16px; flex-wrap:wrap; justify-content:center; }
        .filter-btn { padding:8px 18px; border:2px solid #26a69a; background:#fff; color:#00897b; border-radius:20px; cursor:pointer; font-weight:600; }
        .filter-btn.active { background:#26a69a; color:#fff; }
        .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(300px,1fr)); gap:16px; }
        .card { background:#fff; border-radius:16px; padding:18px; box-shadow:0 3px 10px rgba(0,0,0,.08); border-left:5px solid #26a69a; position:relative; }
        .card.play { border-left-color:#ff7043; } .card.food { border-left-color:#ec407a; } .card.cafe { border-left-color:#ab47bc; }
        .card .badge { display:inline-block; padding:3px 12px; border-radius:12px; font-size:12px; font-weight:700; color:#fff; margin-bottom:8px; }
        .badge.play { background:#ff7043; } .badge.food { background:#ec407a; } .badge.cafe { background:#ab47bc; }
        .card h3 { font-size:18px; margin-bottom:6px; }
        .card .desc { font-size:13px; color:#607d8b; margin-bottom:8px; line-height:1.5; }
        .card .addr { font-size:12px; color:#455a64; background:#f5f5f5; padding:6px 10px; border-radius:8px; margin-bottom:10px; }
        .card .addr::before { content:"📍 "; }
        .card-actions { display:flex; gap:6px; flex-wrap:wrap; }
        .fav-btn,.add-btn,.map-btn,.usr-del { flex:1; min-width:70px; padding:8px; border:none; border-radius:10px; cursor:pointer; font-weight:600; font-size:13px; }
        .fav-btn { background:#fff3e0; color:#ef6c00; border:1.5px solid #ffb74d; }
        .fav-btn.active { background:#ffb74d; color:#fff; }
        .add-btn { background:#e0f2f1; color:#00897b; border:1.5px solid #4db6ac; }
        .map-btn { background:#e3f2fd; color:#1565c0; border:1.5px solid #64b5f6; }
        .usr-del { background:#ffebee; color:#e53935; border:1.5px solid #ef9a9a; flex:0 0 auto; }
        .usr-tag { position:absolute; top:12px; right:12px; font-size:11px; background:#fffde7; color:#f9a825; border:1px solid #ffe082; padding:2px 8px; border-radius:10px; }
        
        .fav-section { background:#fff; border-radius:16px; padding:18px; margin-bottom:20px; box-shadow:0 3px 10px rgba(0,0,0,.08); }
        .fav-section h2 { font-size:18px; margin-bottom:12px; color:#ef6c00; }
        .fav-chips { display:flex; gap:8px; flex-wrap:wrap; }
        .chip { background:#fff3e0; border:1.5px solid #ffb74d; padding:6px 14px; border-radius:18px; font-size:13px; display:flex; align-items:center; gap:8px; }
        .chip .mini-add { cursor:pointer; color:#00897b; font-weight:700; }
        .chip .mini-del { cursor:pointer; color:#e53935; font-weight:700; }
        .empty { color:#90a4ae; font-size:14px; padding:10px; }
        
        .form-card { background:#fff; border-radius:16px; padding:24px; max-width:640px; margin:0 auto 20px; box-shadow:0 3px 10px rgba(0,0,0,.08); }
        .form-card h2 { font-size:18px; margin-bottom:18px; color:#00897b; }
        .form-row { margin-bottom:14px; }
        .form-row label { display:block; font-weight:600; margin-bottom:6px; font-size:14px; color:#455a64; }
        .form-row input,.form-row select,.form-row textarea { width:100%; padding:11px 14px; border:1.5px solid #b0bec5; border-radius:10px; font-size:15px; }
        .form-2col { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
        .save-btn { width:100%; padding:13px; background:linear-gradient(135deg,#00897b,#26a69a); color:#fff; border:none; border-radius:10px; cursor:pointer; font-weight:700; font-size:15px; margin-top:6px; }
        .saved-msg { text-align:center; color:#00897b; font-weight:600; margin-top:12px; min-height:20px; }
        
        .flight-leg { border:1.5px dashed #90caf9; border-radius:12px; padding:16px; margin-bottom:16px; }
        .flight-leg h3 { color:#1976d2; font-size:15px; margin-bottom:12px; }
        .tip { background:#fff8e1; border-left:4px solid #ffca28; padding:12px 16px; border-radius:8px; margin-bottom:16px; font-size:13px; color:#795548; }
        
        .day-tabs { display:flex; gap:6px; margin-bottom:14px; flex-wrap:wrap; }
        .day-btn { padding:8px 14px; border:none; background:#eceff1; border-radius:10px; cursor:pointer; font-weight:600; font-size:13px; }
        .day-btn.active { background:#00897b; color:#fff; }
        .daylabel-bar { display:flex; gap:8px; margin-bottom:14px; flex-wrap:wrap; align-items:center; }
        .daylabel-bar input { padding:9px 12px; border:1.5px solid #b0bec5; border-radius:10px; font-size:14px; min-width:200px; }
        .daylabel-bar button { padding:9px 14px; background:#607d8b; color:#fff; border:none; border-radius:10px; cursor:pointer; font-weight:600; }
        .add-bar { display:flex; gap:8px; margin-bottom:16px; flex-wrap:wrap; }
        .add-bar select,.add-bar input { padding:10px; border:1.5px solid #b0bec5; border-radius:10px; font-size:14px; }
        .add-bar select { min-width:180px; } .add-bar input { width:90px; }
        .add-bar button { padding:10px 18px; background:#00897b; color:#fff; border:none; border-radius:10px; cursor:pointer; font-weight:600; }
        
        /* 여행스케줄 스타일 보완 및 드래그 애니메이션 클래스 */
        .sched-list { list-style:none; min-height: 100px; }
        .sched-item { background:#fff; border-radius:12px; padding:14px 16px; margin-bottom:10px; box-shadow:0 2px 6px rgba(0,0,0,.06); display:flex; align-items:center; gap:12px; border-left:5px solid #26a69a; transition: background-color 0.2s; }
        .sched-item.dragging { opacity:.4; background-color: #f1f3f5; border: 2px dashed #b0bec5 !important; }
        .sched-item.play{border-left-color:#ff7043;} .sched-item.food{border-left-color:#ec407a;} .sched-item.cafe{border-left-color:#ab47bc;}
        .sched-item .time-input { width:70px; padding:6px 8px; border:1.5px solid #cfd8dc; border-radius:8px; font-weight:700; color:#00897b; text-align:center; }
        .sched-item .info { flex:1; }
        .sched-item .info h4 { font-size:16px; margin-bottom:3px; color:#2c3e50; }
        .sched-item .info small { color:#607d8b; }
        .sched-item .drag-handle { color:#b0bec5; font-size:20px; cursor:grab; padding: 4px 10px; user-select: none; }
        .sched-item .sched-map { background:#e3f2fd; color:#1565c0; border:none; border-radius:8px; padding:6px 10px; cursor:pointer; font-weight:700; font-size:12px; }
        .sched-item .del { background:#ffebee; color:#e53935; border:none; border-radius:8px; padding:6px 10px; cursor:pointer; font-weight:700; }
        
        .day-empty { background:#fff; border:2px dashed #b0bec5; border-radius:12px; padding:30px; text-align:center; color:#90a4ae; }
        .reset-btn { background:#e53935; color:#fff; border:none; padding:8px 16px; border-radius:10px; cursor:pointer; float:right; font-weight:600; }
        .route-day { background:#fff; border-radius:16px; padding:20px; margin-bottom:16px; box-shadow:0 3px 10px rgba(0,0,0,.08); }
        .route-day h3 { color:#00897b; font-size:16px; margin-bottom:14px; }
        .route-flow { display:flex; flex-wrap:wrap; align-items:center; gap:8px; margin-bottom:14px; }
        .route-node { background:#e0f2f1; border:1.5px solid #4db6ac; border-radius:20px; padding:8px 14px; font-size:13px; font-weight:600; color:#00695c; }
        .route-arrow { color:#26a69a; font-size:18px; font-weight:700; }
        .route-actions { display:flex; gap:8px; flex-wrap:wrap; }
        .route-map-btn { background:#e3f2fd; color:#1565c0; border:none; border-radius:10px; padding:10px 16px; cursor:pointer; font-weight:600; }
        .route-empty { color:#90a4ae; font-size:14px; }
        .loading-overlay { position:fixed; inset:0; background:rgba(255,255,255,.9); display:flex; align-items:center; justify-content:center; z-index:9999; font-size:18px; color:#00897b; font-weight:700; }
    </style>
</head>
<body>

<div class="loading-overlay" id="loadingOverlay">☁️ Realtime Database 동기화 연결 중...</div>

<header>
    <h1>🌴 <span id="topTitleTarget">여행계획</span> 대시보드</h1>
    <p>📅 일정: <span id="topDateTarget">2026-07-13 ~ 2026-07-16</span> | 🏨 숙소: <span id="topStayTarget">에코그린리조트(한림)</span></p>
    
    <div class="meta-edit-box">
        📍 <input type="text" id="metaDest" placeholder="여행지" style="width:100px;">
        🏨 <input type="text" id="metaStay" placeholder="숙소명" style="width:150px;">
        📅 <input type="date" id="metaSDate"> ~ <input type="date" id="metaEDate">
        <button id="metaSaveBtn">💡 상단정보 저장</button>
    </div>
    <span class="sync-badge" id="syncBadge">연결 중…</span>
</header>

<div class="tabs">
    <button class="tab-btn active" data-tab="dashboard">🏠 대시보드</button>
    <button class="tab-btn" data-tab="places">📋 장소 목록</button>
    <button class="tab-btn" data-tab="flight">✈️ 항공권</button>
    <button class="tab-btn" data-tab="rent">🚗 렌트카</button>
    <button class="tab-btn" data-tab="schedule">🗓️ 여행 스케줄</button>
    <button class="tab-btn" data-tab="route">🧭 이동경로</button>
</div>

<div class="container">
    <div id="dashboard" class="tab-content active">
        <h2 class="section-title">🏠 여행 한눈에 보기</h2>
        <div class="dash-grid" id="dashGrid"></div>
    </div>

    <div id="places" class="tab-content">
        <div class="form-card">
            <h2>➕ 내 장소 추가하기</h2>
            <div class="form-2col">
                <div class="form-row"><label>장소명</label><input type="text" id="npName" placeholder="예: 우리 가족 맛집"></div>
                <div class="form-row"><label>분류</label><select id="npCat"><option value="play">🎡 놀거리</option><option value="food">🍽️ 식당</option><option value="cafe">☕ 카페</option></select></div>
            </div>
            <div class="form-row"><label>설명</label><input type="text" id="npDesc" placeholder="예: 부모님 추천 흑돼지집"></div>
            <div class="form-row"><label>주소</label><input type="text" id="npAddr" placeholder="예: 제주시 한림읍 ..."></div>
            <button class="save-btn" id="npAdd">＋ 장소 추가</button>
            <div class="saved-msg" id="npMsg"></div>
        </div>
        <div class="fav-section">
            <h2>⭐ 내가 찜한 장소</h2>
            <div id="favChips" class="fav-chips"></div>
        </div>
        <div class="filters">
            <button class="filter-btn active" data-cat="all">전체</button>
            <button class="filter-btn" data-cat="play">🎡 놀거리</button>
            <button class="filter-btn" data-cat="food">🍽️ 식당</button>
            <button class="filter-btn" data-cat="cafe">☕ 카페</button>
        </div>
        <div id="grid" class="grid"></div>
    </div>

    <div id="flight" class="tab-content">
        <div class="form-card">
            <h2>✈️ 항공권 정보</h2>
            <div class="flight-leg">
                <h3>🛫 가는 편</h3>
                <div class="form-2col">
                    <div class="form-row"><label>항공사</label><input type="text" id="fgAir"></div>
                    <div class="form-row"><label>편명</label><input type="text" id="fgNo"></div>
                    <div class="form-row"><label>날짜</label><input type="date" id="fgDate"></div>
                    <div class="form-row"><label>시간</label><input type="text" id="fgTime"></div>
                    <div class="form-row"><label>출발/도착 공항</label><input type="text" id="fgRoute"></div>
                    <div class="form-row"><label>좌석/터미널</label><input type="text" id="fgSeat"></div>
                </div>
            </div>
            <div class="flight-leg">
                <h3>🛬 오는 편</h3>
                <div class="form-2col">
                    <div class="form-row"><label>항공사</label><input type="text" id="frAir"></div>
                    <div class="form-row"><label>편명</label><input type="text" id="frNo"></div>
                    <div class="form-row"><label>날짜</label><input type="date" id="frDate"></div>
                    <div class="form-row"><label>시간</label><input type="text" id="frTime"></div>
                    <div class="form-row"><label>출발/도착 공항</label><input type="text" id="frRoute"></div>
                    <div class="form-row"><label>좌석/터미널</label><input type="text" id="frSeat"></div>
                </div>
            </div>
            <div class="form-2col">
                <div class="form-row"><label>인원</label><input type="text" id="fPax"></div>
                <div class="form-row"><label>총 가격</label><input type="text" id="fPrice"></div>
            </div>
            <div class="form-row"><label>예약번호 / 메모</label><input type="text" id="fMemo"></div>
            <button class="save-btn" id="flightSave">💾 항공권 저장</button>
            <div class="saved-msg" id="flightMsg"></div>
        </div>
    </div>

    <div id="rent" class="tab-content">
        <div class="form-card">
            <h2>🚗 렌트카 정보</h2>
            <div class="form-2col">
                <div class="form-row"><label>대여 업체</label><input type="text" id="rCompany"></div>
                <div class="form-row"><label>예약번호</label><input type="text" id="rNo"></div>
                <div class="form-row"><label>차종</label><input type="text" id="rCar"></div>
                <div class="form-row"><label>보험</label><input type="text" id="rIns"></div>
                <div class="form-row"><label>대여 일시</label><input type="text" id="rPickTime"></div>
                <div class="form-row"><label>반납 일시</label><input type="text" id="rDropTime"></div>
                <div class="form-row"><label>대여 장소</label><input type="text" id="rPickPlace"></div>
                <div class="form-row"><label>반납 장소</label><input type="text" id="rDropPlace"></div>
                <div class="form-row"><label>연락처</label><input type="text" id="rTel"></div>
                <div class="form-row"><label>총 요금</label><input type="text" id="rPrice"></div>
            </div>
            <div class="form-row"><label>메모</label><input type="text" id="rMemo"></div>
            <button class="save-btn" id="rentSave">💾 렌트카 저장</button>
            <div class="saved-msg" id="rentMsg"></div>
        </div>
    </div>

    <div id="schedule" class="tab-content">
        <div class="tip">📱 스마트폰에서는 왼쪽의 <b>⠿ 아이콘</b>을 잡고 위아래로 끌어야 순서가 자연스럽게 변경됩니다.</div>
        <button class="reset-btn" id="resetBtn">🔄 기본 일정으로 초기화</button>
        <div class="day-tabs" id="dayTabs"></div>
        <div class="daylabel-bar">
            <input type="text" id="dayLabelInput" placeholder="DAY 라벨 명칭 수정">
            <button id="dayLabelSave">날짜 라벨 저장</button>
        </div>
        <div class="add-bar">
            <input type="text" id="addTime" placeholder="시간" value="10:00">
            <select id="addPlace"></select>
            <button id="addBtn">➕ 일정에 추가</button>
        </div>
        <div id="scheduleDays"></div>
    </div>

    <div id="route" class="tab-content">
        <h2 class="section-title">🧭 날짜별 이동경로</h2>
        <div id="routeBox"></div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

    // 본인의 Firebase 리얼타임 데이터베이스 설정값입니다.
const firebaseConfig = {
  apiKey: "AIzaSyBIAE_sJNf5sFVjLx2gulASmKiE1gSfSk8",
  authDomain: "jeju-ce6de.firebaseapp.com",
  databaseURL: "https://jeju-ce6de-default-rtdb.firebaseio.com",
  projectId: "jeju-ce6de",
  storageBucket: "jeju-ce6de.firebasestorage.app",
  messagingSenderId: "592376893914",
  appId: "1:592376893914:web:685b1b20d4d297dad070e3",
  measurementId: "G-ZMEERVJQ7Z"
};
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const rootRef = ref(db, "trips/family_dashboard");

    window.FB = {
        listen(callback){
            return onValue(rootRef, (snapshot) => {
                callback(snapshot.exists() ? snapshot.val() : null);
            }, (err) => {
                console.error("Firebase 연동 에러:", err);
                window.App && window.App.setSync('off');
            });
        },
        async save(data){
            return set(rootRef, data);
        }
    };
    window.dispatchEvent(new Event('fb-ready'));
</script>

<script>
// 원본 식당, 카페, 놀거리 35개 마스터 데이터 복원 완료
var PLACES = [
    {id:'p1',cat:'play',name:'협재해수욕장',desc:'비양도 뷰 에메랄드 해변, 숙소 인근',addr:'제주시 한림읍 협재리 2497-1'},

var state = {
    meta: { destination: "제주도", accommodation: "에코그린리조트(한림)", startDate: "2026-07-13", endDate: "2026-07-16" },
    favorites: [], userPlaces: [],
    schedule: JSON.parse(JSON.stringify(DEFAULT_SCHEDULE)),
    dayLabels: DEFAULT_DAYS.slice(),
    flight: {}, rent: {}
};

var currentCat='all', currentDay=0;
var applyingRemote=false;

window.App = {
    setSync:function(status, timeStr){
        var b=document.getElementById('syncBadge'); if(!b) return;
        b.className='sync-badge';
        if(status==='on'){ b.classList.add('on'); b.textContent= timeStr ? '🟢 동기화 완료 ('+timeStr+')' : '🟢 연결됨'; }
        else if(status==='off'){ b.classList.add('off'); b.textContent='🔴 실시간 끊김'; }
        else if(status==='saving'){ b.classList.add('saving'); b.textContent='💾 DB 저장 중…'; }
    }
};

function startFirebase(){
    if(!window.FB){ setTimeout(startFirebase,100); return; }
    window.FB.listen(function(data){
        applyingRemote=true;
        if(data){
            if(data.meta) state.meta = data.meta;
            if(data.favorites) state.favorites = data.favorites;
            if(data.userPlaces) state.userPlaces = data.userPlaces;
            if(data.schedule) state.schedule = data.schedule;
            if(data.dayLabels) state.dayLabels = data.dayLabels;
            if(data.flight) state.flight = data.flight;
            if(data.rent) state.rent = data.rent;
        } else {
            pushToCloud();
        }
        sanitize();
        document.getElementById('loadingOverlay').style.display='none';
        
        var d = new Date();
        var timeStr = String(d.getHours()).padStart(2,'0')+":"+String(d.getMinutes()).padStart(2,'0')+":"+String(d.getSeconds()).padStart(2,'0');
        window.App.setSync('on', timeStr);
        renderAll();
        applyingRemote=false;
    });
}

function sanitize(){
    if(!state.meta) state.meta = { destination: "제주도", accommodation: "에코그린리조트(한림)", startDate: "2026-07-13", endDate: "2026-07-16" };
    if(!Array.isArray(state.schedule)) state.schedule=JSON.parse(JSON.stringify(DEFAULT_SCHEDULE));
    while(state.schedule.length < 4) state.schedule.push([]);
    if(!Array.isArray(state.dayLabels)) state.dayLabels=DEFAULT_DAYS.slice();
    if(!state.favorites) state.favorites = [];
    if(!state.userPlaces) state.userPlaces = [];
}

function pushToCloud(){
    if(applyingRemote) return;
    if(!window.FB) return;
    window.App.setSync('saving');
    
    window.FB.save({
        meta: state.meta,
        favorites: state.favorites,
        userPlaces: state.userPlaces,
        schedule: state.schedule,
        dayLabels: state.dayLabels,
        flight: state.flight,
        rent: state.rent
    }).catch(function(e){
        console.error(e);
        window.App.setSync('off');
    });
}

function allPlaces(){ return PLACES.concat(state.userPlaces); }
function getPlace(id){ var a=allPlaces(); for(var i=0;i<a.length;i++){ if(a[i].id===id) return a[i]; } return null; }
function openMap(addr){ if(!addr){ alert('주소가 없습니다.'); return; } window.open('https://map.kakao.com/?q='+encodeURIComponent(addr),'_blank'); }
function flash(id,msg){ var e=document.getElementById(id); if(!e) return; e.textContent=msg; setTimeout(function(){ e.textContent=''; },3000); }

function renderAll(){
    document.getElementById('topStayTarget').textContent = state.meta.accommodation || "미정";
    document.getElementById('topDateTarget').textContent = (state.meta.startDate || "") + " ~ " + (state.meta.endDate || "");
    
    document.getElementById('metaDest').value = state.meta.destination || "";
    document.getElementById('metaStay').value = state.meta.accommodation || "";
    document.getElementById('metaSDate').value = state.meta.startDate || "";
    document.getElementById('metaEDate').value = state.meta.endDate || "";

    renderDash(); renderGrid(); renderFavChips();
    renderSchedule(); renderAddSelect(); syncDayLabelInput();
    loadFlight(); loadRent(); renderRoute();
}

function renderDash(){
    var schedCount=0; for(var i=0; i<state.schedule.length; i++) schedCount+=(state.schedule[i]||[]).length;
    var fg=state.flight || {}, rt=state.rent || {};
    var flightTxt = fg.fgAir ? (fg.fgAir+' '+(fg.fgNo||'')) : '미입력';
    var rentTxt = rt.rCompany ? (rt.rCompany+' '+(rt.rCar||'')) : '미입력';
    
    document.getElementById('dashGrid').innerHTML =
        '<div class="dash-card ddays"><h3>출발일정</h3><div class="big">제주행</div><div class="sub">'+(state.meta.startDate || '')+' 출발</div></div>'+
        '<div class="dash-card"><h3>🏨 숙소 정보</h3><div class="big" style="font-size:18px;">'+(state.meta.accommodation || '미입력')+'</div></div>'+
        '<div class="dash-card flight"><h3>✈️ 항공권</h3><div class="big">'+flightTxt+'</div></div>'+
        '<div class="dash-card rent"><h3>🚗 렌트카</h3><div class="big">'+rentTxt+'</div></div>'+
        '<div class="dash-card"><h3>⭐ 찜한 장소</h3><div class="big">'+state.favorites.length+'곳</div></div>'+
        '<div class="dash-card"><h3>🗓️ 등록된 일정</h3><div class="big">'+schedCount+'개</div></div>';
}

function renderGrid(){
    var grid=document.getElementById('grid'); if(!grid) return;
    var src=allPlaces();
    var list = currentCat==='all'?src:src.filter(function(p){return p.cat===currentCat;});
    grid.innerHTML = list.map(function(p){
        var faved=state.favorites.indexOf(p.id)!==-1;
        var isUser=p.id.toString().indexOf('u')===0;
        return '<div class="card '+p.cat+'">'+(isUser?'<span class="usr-tag">내 장소</span>':'')+'<span class="badge '+p.cat+'">'+catLabel[p.cat]+'</span><h3>'+p.name+'</h3><div class="desc">'+(p.desc||'')+'</div><div class="addr">'+p.addr+'</div><div class="card-actions">'+
            '<button class="fav-btn '+(faved?'active':'')+'" onclick="toggleFav(\''+p.id+'\')">'+(faved?'★ 찜됨':'☆ 찜하기')+'</button>'+
            '<button class="add-btn" onclick="addDirectToSched(\''+p.id+'\')">＋ 일정추가</button>'+
            '<button class="map-btn" onclick="openMap(\''+p.addr+'\')">🗺️ 지도</button>'+
            (isUser?'<button class="usr-del" onclick="delUserPlace(\''+p.id+'\')">🗑</button>':'')+
            '</div></div>';
    }).join('');
}

function addUserPlace(){
    var name=document.getElementById('npName').value.trim();
    var addr=document.getElementById('npAddr').value.trim();
    if(!name||!addr){ flash('npMsg','⚠️ 장소명과 주소는 필수입니다.'); return; }
    var p={ id:'u'+Date.now(), cat:document.getElementById('npCat').value, name:name, desc:document.getElementById('npDesc').value.trim(), addr:addr };
    state.userPlaces.push(p); pushToCloud();
    document.getElementById('npName').value=''; document.getElementById('npDesc').value=''; document.getElementById('npAddr').value='';
    renderGrid(); renderAddSelect(); flash('npMsg','✅ 추가 완료!');
}

function delUserPlace(id){
    if(!confirm('삭제하시겠습니까?')) return;
    state.userPlaces = state.userPlaces.filter(p => p.id !== id);
    state.favorites = state.favorites.filter(fId => fId !== id);
    pushToCloud(); renderGrid(); renderFavChips(); renderAddSelect();
}

function toggleFav(id){
    var i=state.favorites.indexOf(id); if(i!==-1) state.favorites.splice(i,1); else state.favorites.push(id);
    pushToCloud(); renderGrid(); renderFavChips();
}

function renderFavChips(){
    var box=document.getElementById('favChips'); if(!box) return;
    if(state.favorites.length===0){ box.innerHTML='<div class="empty">찜한 장소가 없습니다.</div>'; return; }
    box.innerHTML=state.favorites.map(function(id){
        var p=getPlace(id); if(!p) return '';
        return '<div class="chip">'+catLabel[p.cat].split(' ')[0]+' '+p.name+'<span class="mini-add" onclick="addDirectToSched(\''+id+'\')">＋</span><span class="mini-del" onclick="toggleFav(\''+id+'\')">✕</span></div>';
    }).join('');
}

function renderDayTabs(){
    var el = document.getElementById('dayTabs'); if(!el) return;
    el.innerHTML = state.dayLabels.map(function(d,i){
        return '<button class="day-btn '+(i===currentDay?'active':'')+'" onclick="switchDay('+i+')">'+d+'</button>';
    }).join('');
}

function switchDay(idx){ currentDay=idx; renderSchedule(); syncDayLabelInput(); }
function syncDayLabelInput(){ var el=document.getElementById('dayLabelInput'); if(el) el.value=state.dayLabels[currentDay]||''; }

function renderSchedule(){
    renderDayTabs();
    var box=document.getElementById('scheduleDays'); if(!box) return;
    var di=currentDay; 
    var items=state.schedule[di]||[]; 
    
    if(items.length===0){ 
        box.innerHTML='<div class="day-empty">일정이 비어있습니다. 장소를 선택해서 추가해주세요.</div>'; 
        return; 
    }
    
    var inner = '<ul class="sched-list" id="sortableList">';
    items.forEach(function(it, idx){
        var p = (it.id==='arrive'||it.id==='checkin'||it.id==='finish') ? it : (getPlace(it.id)||{name:'(삭제됨)',cat:'play',addr:''});
        var name=it.name||p.name; var cat=it.cat||p.cat; var addr=it.addr||p.addr;
        
        inner += '<li class="sched-item '+cat+'" data-idx="'+idx+'">'+
            '<span class="drag-handle">⠿</span>'+
            '<input class="time-input" type="text" value="'+it.t+'" onchange="updateTime('+di+','+idx+',this.value)">'+
            '<div class="info"><h4>'+name+'</h4><small>📍 '+addr+'</small></div>'+
            '<button class="sched-map" onclick="openMap(\''+addr+'\')">🗺️</button>'+
            '<button class="del" onclick="delSchedItem('+di+','+idx+')">삭제</button>'+
            '</li>';
    });
    inner += '</ul>';
    box.innerHTML = inner;
    
    setupDragAndDrop();
}

function renderAddSelect(){
    var sel=document.getElementById('addPlace'); if(!sel) return;
    var src=allPlaces();
    sel.innerHTML = src.map(function(p){ return '<option value="'+p.id+'">['+catLabel[p.cat].split(' ')[0]+'] '+p.name+'</option>'; }).join('');
}

function addDirectToSched(id){
    var p = getPlace(id); if(!p) return;
    var time = prompt("방문 시간을 입력하세요 (예: 14:00)", "12:00");
    if(time === null) return;
    if(!state.schedule[currentDay]) state.schedule[currentDay] = [];
    state.schedule[currentDay].push({t:time, id:p.id});
    state.schedule[currentDay].sort((a,b)=>a.t.localeCompare(b.t));
    pushToCloud(); renderSchedule();
}

function updateTime(dayIdx, itemIdx, val){
    state.schedule[dayIdx][itemIdx].t = val;
    state.schedule[dayIdx].sort((a,b)=>a.t.localeCompare(b.t));
    pushToCloud(); renderSchedule();
}

function delSchedItem(dayIdx, itemIdx){
    state.schedule[dayIdx].splice(itemIdx,1);
    pushToCloud(); renderSchedule();
}

function renderRoute(){
    var box=document.getElementById('routeBox'); if(!box) return;
    box.innerHTML = state.dayLabels.map(function(label, di){
        var items = state.schedule[di] || [];
        var nodes = items.map(function(it){
            var p=it.id==='arrive'||it.id==='checkin'||it.id==='finish'?it:(getPlace(it.id)||{name:'(삭제됨)'});
            return '<span class="route-node">'+it.t+' '+p.name+'</span>';
        }).join('<span class="route-arrow">→</span>');
        
        return '<div class="route-day"><h3>🧭 '+label+' 이동 경로</h3>'+
            '<div class="route-flow">'+(nodes || '<span class="route-empty">등록된 일정이 없습니다.</span>')+'</div></div>';
    }).join('');
}

function loadFlight(){
    var f = state.flight || {};
    ['fgAir','fgNo','fgDate','fgTime','fgRoute','fgSeat','frAir','frNo','frDate','frTime','frRoute','frSeat','fPax','fPrice','fMemo'].forEach(function(id){
        var el = document.getElementById(id); if(el) el.value = f[id] || '';
    });
}

function saveFlight(){
    if(!state.flight) state.flight = {};
    ['fgAir','fgNo','fgDate','fgTime','fgRoute','fgSeat','frAir','frNo','frDate','frTime','frRoute','frSeat','fPax','fPrice','fMemo'].forEach(function(id){
        var el = document.getElementById(id); if(el) state.flight[id] = el.value.trim();
    });
    pushToCloud(); flash('flightMsg','✅ 항공권 정보 Realtime DB 저장 완료!');
}

function loadRent(){
    var r = state.rent || {};
    ['rCompany','rNo','rCar','rIns','rPickTime','rDropTime','rPickPlace','rDropPlace','rTel','rPrice','rMemo'].forEach(function(id){
        var el = document.getElementById(id); if(el) el.value = r[id] || '';
    });
}

function saveRent(){
    if(!state.rent) state.rent = {};
    ['rCompany','rNo','rCar','rIns','rPickTime','rDropTime','rPickPlace','rDropPlace','rTel','rPrice','rMemo'].forEach(function(id){
        var el = document.getElementById(id); if(el) state.rent[id] = el.value.trim();
    });
    pushToCloud(); flash('rentMsg','✅ 렌트카 정보 Realtime DB 저장 완료!');
}

// 📱 PC 마우스 및 스마트폰 터치를 동시 지원하는 멀티 드래그 핵심 함수
function setupDragAndDrop(){
    var list = document.getElementById('sortableList'); if(!list) return;

    // SortableJS 인스턴스를 생성하여 멀티플랫폼 드래그앤드롭 강제 바인딩
    Sortable.create(list, {
        animation: 150,         // 정렬될 때 자연스러운 롤링 애니메이션 (150ms)
        handle: '.drag-handle',  // 💡 중요: 오직 '⠿' 버튼을 잡고 끌 때만 드래그 작동 (모바일 스크롤 충돌 방지)
        ghostClass: 'dragging',  // 드래그 중인 임시 대상 카드 디자인 클래스
        
        onEnd: function(evt) {
            var newItems = list.getElementsByClassName('sched-item');
            var newSched = [];
            
            // 변경된 DOM 배치 순서대로 기존 데이터셋을 복원 추적
            for(var j=0; j<newItems.length; j++){
                var oldIdx = parseInt(newItems[j].getAttribute('data-idx'));
                newSched.push(state.schedule[currentDay][oldIdx]);
            }
            
            // 상태 갱신 및 파이어베이스 클라우드로 즉시 업로드
            state.schedule[currentDay] = newSched;
            pushToCloud(); 
            
            // 데이터 변경에 따라 인덱스(data-idx)를 일괄 정렬 리렌더링
            setTimeout(renderSchedule, 50);
        }
    });
}

document.addEventListener('DOMContentLoaded', function(){
    document.getElementById('metaSaveBtn').addEventListener('click', function(){
        state.meta = {
            destination: document.getElementById('metaDest').value.trim(),
            accommodation: document.getElementById('metaStay').value.trim(),
            startDate: document.getElementById('metaSDate').value,
            endDate: document.getElementById('metaEDate').value
        };
        pushToCloud(); renderAll();
        alert('✨ 상단 기본 정보가 실시간 데이터베이스에 저장되었습니다!');
    });

    document.querySelectorAll('.tabs .tab-btn').forEach(function(btn){
        btn.addEventListener('click', function(){
            var tabName = this.getAttribute('data-tab');
            document.querySelectorAll('.tabs .tab-btn').forEach(b => b.classList.remove('active'));
            this.classList.add('active');
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.getElementById(tabName).classList.add('active');
            if(tabName==='dashboard') renderDash();
            if(tabName==='places') { renderGrid(); renderFavChips(); }
            if(tabName==='schedule') { renderSchedule(); renderAddSelect(); syncDayLabelInput(); }
            if(tabName==='flight') loadFlight();
            if(tabName==='rent') loadRent();
            if(tabName==='route') renderRoute();
        });
    });

    document.querySelectorAll('.filters .filter-btn').forEach(function(btn){
        btn.addEventListener('click', function(){
            document.querySelectorAll('.filters .filter-btn').forEach(b => b.classList.remove('active'));
            this.classList.add('active'); currentCat = this.getAttribute('data-cat'); renderGrid();
        });
    });

    document.getElementById('npAdd').addEventListener('click', addUserPlace);
    document.getElementById('flightSave').addEventListener('click', saveFlight);
    document.getElementById('rentSave').addEventListener('click', saveRent);

    document.getElementById('dayLabelSave').addEventListener('click', function(){
        var val = document.getElementById('dayLabelInput').value.trim(); if(!val) return;
        state.dayLabels[currentDay] = val; pushToCloud(); renderSchedule(); alert('🏷️ 날짜 라벨 변경 완료.');
    });

    document.getElementById('addBtn').addEventListener('click', function(){
        var pid = document.getElementById('addPlace').value;
        var time = document.getElementById('addTime').value.trim() || '10:00'; if(!pid) return;
        if(!state.schedule[currentDay]) state.schedule[currentDay] = [];
        state.schedule[currentDay].push({t:time, id:pid});
        state.schedule[currentDay].sort((a,b)=>a.t.localeCompare(b.t));
        pushToCloud(); renderSchedule();
    });

    document.getElementById('resetBtn').addEventListener('click', function(){
        if(!confirm('기본 스케줄로 전체 초기화할까요?')) return;
        state.schedule = JSON.parse(JSON.stringify(DEFAULT_SCHEDULE));
        state.dayLabels = DEFAULT_DAYS.slice(); 
        state.favorites = []; state.userPlaces = []; state.flight = {}; state.rent = {};
        pushToCloud(); renderSchedule();
    });

    startFirebase();
});
</script>
