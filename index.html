<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>실시간 모바일 플래너 (Realtime DB)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
    <style>
        body { -webkit-tap-highlight-color: transparent; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .sortable-ghost { opacity: 0.4; background-color: #e0e7ff !important; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 antialiased pb-24 md:pb-0 md:pt-16">

    <header class="bg-white border-b border-gray-200 fixed top-0 left-0 right-0 h-16 px-4 flex justify-between items-center z-40 shadow-sm">
        <h1 class="text-lg font-bold text-gray-900 tracking-tight">
            <i class="fa-solid fa-paper-plane text-indigo-500 mr-1"></i> Our Travel Plan
        </h1>
        <button onclick="saveAllData()" class="bg-indigo-600 active:bg-indigo-700 text-white font-medium text-sm px-4 py-2 rounded-xl shadow-sm transition flex items-center space-x-1">
            <i class="fa-solid fa-cloud-arrow-up text-xs"></i> <span>저장/공유</span>
        </button>
    </header>

    <main class="max-w-md mx-auto pt-20 px-4 pb-8 md:max-w-2xl">
        
        <div id="tab-basic" class="tab-content space-y-5">
            <div class="bg-white p-5 rounded-2xl shadow-sm border border-gray-100">
                <h3 class="text-sm font-semibold text-gray-400 uppercase tracking-wider mb-3">📍 여행 개요</h3>
                <div class="space-y-3">
                    <div>
                        <input type="text" id="trip-title" class="w-full bg-gray-50 border-0 rounded-xl p-3 text-base font-medium focus:ring-2 focus:ring-indigo-500 outline-none" placeholder="여행 제목을 입력하세요">
                    </div>
                    <div>
                        <input type="text" id="trip-dates" class="w-full bg-gray-50 border-0 rounded-xl p-3 text-sm focus:ring-2 focus:ring-indigo-500 outline-none" placeholder="여행 일정 (예: 7/10 ~ 7/17)">
                    </div>
                </div>
            </div>

            <div class="bg-white p-5 rounded-2xl shadow-sm border border-gray-100">
                <h3 class="text-sm font-semibold text-gray-400 uppercase tracking-wider mb-3">🛫 항공권 정보</h3>
                <div class="space-y-3">
                    <div>
                        <label class="block text-xs font-medium text-gray-500 mb-1">출발 편</label>
                        <textarea id="flight-departure" rows="2" class="w-full bg-gray-50 border-0 rounded-xl p-3 text-sm focus:ring-2 focus:ring-indigo-500 outline-none" placeholder="편명, 시간 등 입력"></textarea>
                    </div>
                    <div>
                        <label class="block text-xs font-medium text-gray-500 mb-1">귀국 편</label>
                        <textarea id="flight-return" rows="2" class="w-full bg-gray-50 border-0 rounded-xl p-3 text-sm focus:ring-2 focus:ring-indigo-500 outline-none" placeholder="편명, 시간 등 입력"></textarea>
                    </div>
                </div>
            </div>
        </div>

        <div id="tab-schedule" class="tab-content hidden space-y-4">
            <div class="flex justify-between items-center px-1">
                <span class="text-xs text-gray-400"><i class="fa-solid fa-sort mr-1"></i>아이콘(☰)을 길게 눌러 드래그하세요.</span>
                <button onclick="addDayBlock()" class="text-xs bg-indigo-50 text-indigo-600 font-semibold px-3 py-1.5 rounded-lg active:bg-indigo-100">
                    + 일차 추가
                </button>
            </div>
            <div id="schedule-container" class="space-y-3"></div>
        </div>

        <div id="tab-stay-rent" class="tab-content hidden space-y-6">
            <div class="bg-white p-5 rounded-2xl shadow-sm border border-gray-100">
                <div class="flex justify-between items-center mb-3">
                    <h3 class="text-sm font-semibold text-gray-400 uppercase tracking-wider">🏨 숙소</h3>
                    <button onclick="addStayItem()" class="text-xs text-indigo-600 font-bold">+ 추가</button>
                </div>
                <div id="stay-container" class="space-y-3"></div>
            </div>
            <div class="bg-white p-5 rounded-2xl shadow-sm border border-gray-100">
                <div class="flex justify-between items-center mb-3">
                    <h3 class="text-sm font-semibold text-gray-400 uppercase tracking-wider">🚗 교통 / 렌트카</h3>
                    <button onclick="addRentItem()" class="text-xs text-indigo-600 font-bold">+ 추가</button>
                </div>
                <div id="rent-container" class="space-y-3"></div>
            </div>
        </div>

        <div id="tab-places" class="tab-content hidden space-y-4">
            <div class="flex justify-between items-center px-1">
                <span class="text-xs text-gray-400">가고 싶은 핫플레이스 리스트</span>
                <button onclick="addPlaceItem()" class="text-xs bg-indigo-50 text-indigo-600 font-semibold px-3 py-1.5 rounded-lg active:bg-indigo-100">
                    + 장소 추가
                </button>
            </div>
            <div id="places-container" class="space-y-3"></div>
        </div>

    </main>

    <div class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 px-2 py-2 flex justify-around items-center z-50 shadow-[0_-2px_10px_rgba(0,0,0,0.03)] md:top-16 md:bottom-auto md:border-b md:border-t-0 md:shadow-none">
        <button onclick="switchTab('basic')" id="tab-btn-basic" class="tab-btn flex flex-col items-center space-y-1 py-1 px-3 text-indigo-600">
            <i class="fa-solid fa-circle-info text-lg"></i>
            <span class="text-[10px] font-medium">정보/항공</span>
        </button>
        <button onclick="switchTab('schedule')" id="tab-btn-schedule" class="tab-btn flex flex-col items-center space-y-1 py-1 px-3 text-gray-400">
            <i class="fa-solid fa-route text-lg"></i>
            <span class="text-[10px] font-medium">상세일정</span>
        </button>
        <button onclick="switchTab('stay-rent')" id="tab-btn-stay-rent" class="tab-btn flex flex-col items-center space-y-1 py-1 px-3 text-gray-400">
            <i class="fa-solid fa-bed text-lg"></i>
            <span class="text-[10px] font-medium">숙소/차</span>
        </button>
        <button onclick="switchTab('places')" id="tab-btn-places" class="tab-btn flex flex-col items-center space-y-1 py-1 px-3 text-gray-400">
            <i class="fa-solid fa-heart text-lg"></i>
            <span class="text-[10px] font-medium">핫플들</span>
        </button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        // 🛠️ 리얼타임 데이터베이스용 라이브러리로 전면 교체되었습니다.
        import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // 본인의 Firebase 정보 입력 필수!
        const firebaseConfig = {
            apiKey: "AIzaSyBIAE_sJNf5sFVjLx2gulASmKiE1gSfSk8",
            authDomain: "jeju-ce6de.firebaseapp.com",
            projectId: "jeju-ce6de",
            storageBucket: "jeju-ce6de.firebasestorage.app",
            messagingSenderId: "592376893914",
            appId: "1:592376893914:web:685b1b20d4d297dad070e3",
            // ⚠️ 리얼타임 DB 사용 시 아래 databaseURL 주소가 정확히 들어가야 합니다!
            databaseURL: "https://jeju-ce6de-default-rtdb.firebaseio.com/" 
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const dbRef = ref(db, "travelPlans/shared-dashboard");

        // 전역 함수 연결
        window.switchTab = switchTab;
        window.addDayBlock = addDayBlock;
        window.deleteDayBlock = deleteDayBlock;
        window.addStayItem = addStayItem;
        window.addRentItem = addRentItem;
        window.addPlaceItem = addPlaceItem;
        window.saveAllData = saveAllData;

        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
            document.getElementById(`tab-${tabId}`).classList.remove('hidden');
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('text-indigo-600'); btn.classList.add('text-gray-400');
            });
            document.getElementById(`tab-btn-${tabId}`).classList.add('text-indigo-600');
            document.getElementById(`tab-btn-${tabId}`).classList.remove('text-gray-400');
        }

        // 드래그 앤 드롭 이니셜라이저
        const el = document.getElementById('schedule-container');
        Sortable.create(el, {
            handle: '.drag-handle',
            animation: 150,
            ghostClass: 'sortable-ghost'
        });

        // UI 추가 삭제 함수들
        function addDayBlock(dayData = { day: '', plan: '' }) {
            const container = document.getElementById('schedule-container');
            const html = `
                <div class="day-card bg-white p-4 rounded-2xl border border-gray-100 shadow-sm flex items-start space-x-3">
                    <div class="drag-handle text-gray-300 py-2 px-1 cursor-grab active:cursor-grabbing text-base"><i class="fa-solid fa-bars"></i></div>
                    <div class="w-16"><input type="text" class="day-title font-bold text-indigo-600 bg-transparent text-sm w-full outline-none border-b border-transparent focus:border-indigo-500 py-1" value="${dayData.day || '1일차'}"></div>
                    <div class="flex-1"><textarea class="day-plan w-full bg-gray-50 border-0 text-xs p-2.5 rounded-xl outline-none focus:ring-1 focus:ring-indigo-500 resize-none" rows="2" placeholder="일정을 적어보세요">${dayData.plan || ''}</textarea></div>
                    <button onclick="this.closest('.day-card').remove()" class="text-gray-300 hover:text-red-400 py-2 px-1"><i class="fa-solid fa-xmark"></i></button>
                </div>`;
            container.insertAdjacentHTML('beforeend', html);
        }

        function addStayItem(data = { name: '', memo: '' }) {
            const container = document.getElementById('stay-container');
            const html = `
                <div class="stay-item bg-gray-50 p-3.5 rounded-xl border border-gray-100 flex flex-col space-y-2 relative">
                    <button onclick="this.closest('.stay-item').remove()" class="absolute top-3 right-3 text-gray-300"><i class="fa-solid fa-xmark"></i></button>
                    <input type="text" class="stay-name text-sm font-bold bg-transparent outline-none border-b border-transparent focus:border-indigo-500 pr-6" value="${data.name || ''}" placeholder="숙소명 및 체크인날짜">
                    <textarea class="stay-memo text-xs text-gray-500 bg-transparent outline-none resize-none" rows="1" placeholder="메모 (예약번호, 주소 등)">${data.memo || ''}</textarea>
                </div>`;
            container.insertAdjacentHTML('beforeend', html);
        }

        function addRentItem(data = { name: '', memo: '' }) {
            const container = document.getElementById('rent-container');
            const html = `
                <div class="rent-item bg-gray-50 p-3.5 rounded-xl border border-gray-100 flex flex-col space-y-2 relative">
                    <button onclick="this.closest('.rent-item').remove()" class="absolute top-3 right-3 text-gray-300"><i class="fa-solid fa-xmark"></i></button>
                    <input type="text" class="rent-name text-sm font-bold bg-transparent outline-none border-b border-transparent focus:border-indigo-500 pr-6" value="${data.name || ''}" placeholder="렌트카/교통수단">
                    <textarea class="rent-memo text-xs text-gray-500 bg-transparent outline-none resize-none" rows="1" placeholder="메모 (픽업 장소, 예약번호)">${data.memo || ''}</textarea>
                </div>`;
            container.insertAdjacentHTML('beforeend', html);
        }

        function addPlaceItem(data = { type: '식당', name: '', memo: '' }) {
            const container = document.getElementById('places-container');
            const html = `
                <div class="place-card bg-white p-4 rounded-2xl border border-gray-100 shadow-sm flex flex-col space-y-2 relative">
                    <button onclick="this.closest('.place-card').remove()" class="absolute top-4 right-4 text-gray-300"><i class="fa-solid fa-xmark"></i></button>
                    <div class="flex space-x-2">
                        <select class="place-type bg-gray-50 text-xs rounded-lg px-2 py-1 outline-none font-medium">
                            <option value="식당" ${data.type === '식당' ? 'selected' : ''}>🍴 식당</option>
                            <option value="카페" ${data.type === '카페' ? 'selected' : ''}>☕ 카페</option>
                            <option value="놀거리" ${data.type === '놀거리' ? 'selected' : ''}>🎡 놀거리</option>
                        </select>
                        <input type="text" class="place-name border-b border-transparent focus:border-indigo-500 flex-1 font-bold outline-none px-1 text-sm pr-6" value="${data.name || ''}" placeholder="장소명">
                    </div>
                    <textarea class="place-memo text-xs text-gray-500 bg-gray-50 rounded-xl p-2.5 outline-none focus:ring-1 focus:ring-indigo-500" rows="2" placeholder="메뉴 추천, 구글맵 링크 등">${data.memo || ''}</textarea>
                </div>`;
            container.insertAdjacentHTML('beforeend', html);
        }

        // --- 실시간 데이터 저장 (Realtime DB 규격) ---
        async function saveAllData() {
            try {
                const schedule = [];
                document.querySelectorAll('.day-card').forEach(card => {
                    schedule.push({ day: card.querySelector('.day-title').value, plan: card.querySelector('.day-plan').value });
                });
                const stays = [];
                document.querySelectorAll('.stay-item').forEach(item => {
                    stays.push({ name: item.querySelector('.stay-name').value, memo: item.querySelector('.stay-memo').value });
                });
                const rents = [];
                document.querySelectorAll('.rent-item').forEach(item => {
                    rents.push({ name: item.querySelector('.rent-name').value, memo: item.querySelector('.rent-memo').value });
                });
                const places = [];
                document.querySelectorAll('.place-card').forEach(card => {
                    places.push({ type: card.querySelector('.place-type').value, name: card.querySelector('.place-name').value, memo: card.querySelector('.place-memo').value });
                });

                // Firestore의 setDoc 대신 Realtime DB의 set 함수를 사용합니다.
                await set(dbRef, {
                    title: document.getElementById('trip-title').value,
                    dates: document.getElementById('trip-dates').value,
                    flightDeparture: document.getElementById('flight-departure').value,
                    flightReturn: document.getElementById('flight-return').value,
                    schedule, stays, rents, places,
                    updatedAt: new Date().toISOString()
                });
                alert("💾 클라우드 저장 성공!");
            } catch (error) {
                console.error(error);
                alert("저장 실패! 파이어베이스 설정이나 규칙을 확인하세요.");
            }
        }

        // --- 실시간 데이터 불러오기 (Realtime DB 규격) ---
        onValue(dbRef, (snapshot) => {
            const data = snapshot.val();
            if (data) {
                const active = document.activeElement;
                if(active !== document.getElementById('trip-title')) document.getElementById('trip-title').value = data.title || '';
                if(active !== document.getElementById('trip-dates')) document.getElementById('trip-dates').value = data.dates || '';
                if(active !== document.getElementById('flight-departure')) document.getElementById('flight-departure').value = data.flightDeparture || '';
                if(active !== document.getElementById('flight-return')) document.getElementById('flight-return').value = data.flightReturn || '';

                if (!active || active.tagName === 'BODY' || active.tagName === 'BUTTON') {
                    document.getElementById('schedule-container').innerHTML = '';
                    if(data.schedule) data.schedule.forEach(item => addDayBlock(item));

                    document.getElementById('stay-container').innerHTML = '';
                    if(data.stays) data.stays.forEach(item => addStayItem(item));

                    document.getElementById('rent-container').innerHTML = '';
                    if(data.rents) data.rents.forEach(item => addRentItem(item));

                    document.getElementById('places-container').innerHTML = '';
                    if(data.places) data.places.forEach(item => addPlaceItem(item));
                }
            } else {
                document.getElementById('schedule-container').innerHTML = '';
                document.getElementById('stay-container').innerHTML = '';
                document.getElementById('rent-container').innerHTML = '';
                document.getElementById('places-container').innerHTML = '';
                addDayBlock({ day: '1일차', plan: '' });
                addStayItem(); addRentItem(); addPlaceItem();
            }
        });
    </script>
</body>
</html>
